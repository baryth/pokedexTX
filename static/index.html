<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pokédex</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f2f2f2;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #cc0000;
      color: #fff;
      padding: .9rem 1.5rem;
      display: flex;
      align-items: center;
      gap: .75rem;
    }

    header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: .3px; }

    nav {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      padding: 0 1rem;
    }

    nav button {
      padding: .75rem 1.25rem;
      border: none;
      background: none;
      cursor: pointer;
      font-size: .9rem;
      color: #666;
      border-bottom: 3px solid transparent;
      margin-bottom: -1px;
      transition: color .15s, border-color .15s;
    }

    nav button.active { color: #cc0000; border-bottom-color: #cc0000; font-weight: 600; }
    nav button:hover:not(.active) { color: #333; }

    main {
      max-width: 860px;
      margin: 1.5rem auto;
      padding: 0 1rem 2rem;
    }

    section { display: none; }
    section.active { display: block; }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      overflow: hidden;
      margin-bottom: 1.25rem;
    }

    .card-header {
      padding: .8rem 1.25rem;
      border-bottom: 1px solid #f0f0f0;
      font-weight: 600;
      font-size: .92rem;
      color: #333;
    }

    table { width: 100%; border-collapse: collapse; }

    th {
      padding: .55rem 1.25rem;
      text-align: left;
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #aaa;
      background: #fafafa;
      border-bottom: 1px solid #f0f0f0;
    }

    td {
      padding: .6rem 1.25rem;
      font-size: .88rem;
      border-bottom: 1px solid #f5f5f5;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }

    .id-cell { color: #bbb; font-size: .78rem; width: 48px; }

    .badge {
      display: inline-block;
      padding: .15rem .48rem;
      border-radius: 99px;
      font-size: .7rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: .3px;
      margin-right: 3px;
    }

    /* Form */
    .form-body { padding: 1.1rem 1.25rem; }

    .form-row {
      display: flex;
      gap: .6rem;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .field { display: flex; flex-direction: column; gap: .25rem; flex: 1; min-width: 100px; }
    .field label { font-size: .75rem; color: #777; font-weight: 500; }

    .field input {
      padding: .42rem .65rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: .88rem;
      outline: none;
      transition: border-color .15s;
      width: 100%;
    }

    .field input:focus { border-color: #cc0000; }

    .btn {
      padding: .44rem 1.1rem;
      background: #cc0000;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: .88rem;
      font-weight: 600;
      align-self: flex-end;
      transition: background .15s;
      white-space: nowrap;
    }

    .btn:hover { background: #a80000; }

    .del-btn {
      padding: .25rem .65rem;
      background: none;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: .78rem;
      color: #999;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }

    .del-btn:hover { border-color: #cc0000; color: #cc0000; }

    .msg { font-size: .8rem; margin-top: .5rem; min-height: 1rem; }
    .msg.ok { color: #2a7d2a; }
    .msg.err { color: #c00; }

    .empty { padding: 1.75rem; text-align: center; color: #ccc; font-size: .88rem; }
  </style>
</head>
<body>

<header>
  <svg width="26" height="26" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="47" fill="#fff"/>
    <path d="M3 50 A47 47 0 0 1 97 50Z" fill="#cc0000"/>
    <circle cx="50" cy="50" r="13" fill="#fff" stroke="#333" stroke-width="5"/>
    <line x1="3" y1="50" x2="37" y2="50" stroke="#333" stroke-width="5"/>
    <line x1="63" y1="50" x2="97" y2="50" stroke="#333" stroke-width="5"/>
  </svg>
  <h1>Pokédex</h1>
</header>

<nav>
  <button class="active" onclick="showTab(event,'pokemons')">Pokémons</button>
  <button onclick="showTab(event,'trainers')">Trainers</button>
</nav>

<main>

  <!-- Pokémons tab -->
  <section id="pokemons" class="active">
    <div class="card">
      <div class="card-header">All Pokémons</div>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Type</th>
            <th>HP</th>
          </tr>
        </thead>
        <tbody id="pokemon-list">
          <tr><td colspan="4" class="empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <!-- Trainers tab -->
  <section id="trainers">
    <div class="card">
      <div class="card-header">Add Trainer</div>
      <div class="form-body">
        <form onsubmit="createTrainer(event)">
          <div class="form-row">
            <input type="hidden" id="t-id" required>
            <div class="field">
              <label>Name</label>
              <input type="text" id="t-name" placeholder="Ash Ketchum" required>
            </div>
            <div class="field">
              <label>City</label>
              <input type="text" id="t-city" placeholder="Pallet Town">
            </div>
            <button type="submit" class="btn">Add</button>
          </div>
          <div id="trainer-msg" class="msg"></div>
        </form>
      </div>
    </div>

    <div class="card">
      <div class="card-header">All Trainers</div>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>City</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="trainer-list">
          <tr><td colspan="3" class="empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </section>

</main>

<script>
  const TYPE_COLORS = {
    Fire:     '#E8602C',
    Water:    '#4F8EF7',
    Grass:    '#5DA832',
    Electric: '#C4A000',
    Psychic:  '#E0366A',
    Ice:      '#4FBFBF',
    Dragon:   '#6030C8',
    Dark:     '#5A4840',
    Fairy:    '#D966A0',
    Normal:   '#8A8A60',
    Fighting: '#B02020',
    Flying:   '#8878D8',
    Poison:   '#8830A0',
    Ground:   '#B09040',
    Rock:     '#9A8430',
    Bug:      '#8A9A10',
    Ghost:    '#5A4870',
    Steel:    '#8888A0',
  };

  function typeBadges(typeStr) {
    if (!typeStr) return '<span style="color:#ccc">—</span>';
    return typeStr.split(',').map(t => t.trim()).filter(Boolean).map(t => {
      const color = TYPE_COLORS[t] || '#999';
      return `<span class="badge" style="background:${color}">${t}</span>`;
    }).join('');
  }

  function showTab(e, name) {
    document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(name).classList.add('active');
    e.currentTarget.classList.add('active');
    if (name === 'trainers') loadTrainers();
  }

  async function loadPokemons() {
    const tbody = document.getElementById('pokemon-list');
    try {
      const data = await fetch('/pokemons').then(r => r.json());
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty">No pokémons found.</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(p => `
        <tr>
          <td class="id-cell">${p.id}</td>
          <td><strong>${p.name}</strong></td>
          <td>${typeBadges(p.type)}</td>
          <td>${p.hp ?? '—'}</td>
        </tr>`).join('');
    } catch {
      tbody.innerHTML = '<tr><td colspan="4" class="empty">Failed to load pokémons.</td></tr>';
    }
  }

  function setNextId(data) {
    const nextId = data.length ? Math.max(...data.map(t => t.id)) + 1 : 1;
    document.getElementById('t-id').value = nextId;
  }

  async function loadTrainers() {
    const tbody = document.getElementById('trainer-list');
    tbody.innerHTML = '<tr><td colspan="3" class="empty">Loading…</td></tr>';
    try {
      const data = await fetch('/trainers').then(r => r.json());
      setNextId(data);
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="3" class="empty">No trainers yet.</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(t => `
        <tr>
          <td><strong>${t.name}</strong></td>
          <td>${t.city ?? '<span style="color:#ccc">—</span>'}</td>
          <td style="text-align:right"><button class="del-btn" onclick="deleteTrainer(${t.id})">Remove</button></td>
        </tr>`).join('');
    } catch {
      tbody.innerHTML = '<tr><td colspan="3" class="empty">Failed to load trainers.</td></tr>';
    }
  }

  async function deleteTrainer(id) {
    await fetch(`/trainers/${id}`, { method: 'DELETE' });
    loadTrainers();
  }

  async function createTrainer(e) {
    e.preventDefault();
    const msg = document.getElementById('trainer-msg');
    const body = {
      id:   parseInt(document.getElementById('t-id').value),
      name: document.getElementById('t-name').value.trim(),
      city: document.getElementById('t-city').value.trim() || null,
    };
    try {
      const res = await fetch('/trainers', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (res.ok) {
        msg.textContent = `Trainer "${body.name}" added!`;
        msg.className = 'msg ok';
        e.target.reset();
        loadTrainers();
      } else {
        const err = await res.json();
        msg.textContent = err.detail || 'Error creating trainer.';
        msg.className = 'msg err';
      }
    } catch {
      msg.textContent = 'Network error.';
      msg.className = 'msg err';
    }
    setTimeout(() => { msg.textContent = ''; msg.className = 'msg'; }, 3000);
  }

  loadPokemons();
</script>
</body>
</html>
